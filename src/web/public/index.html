<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawaii Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fdf4ff', 100:'#fae8ff', 200:'#f5d0fe', 300:'#f0abfc', 400:'#e879f9', 500:'#d946ef', 600:'#c026d3', 700:'#a21caf', 800:'#86198f', 900:'#701a75' },
            surface: { light:'#ffffff', dark:'#1a1a2e' },
            card: { light:'#ffffff', dark:'#16213e' },
            muted: { light:'#f1f5f9', dark:'#0f172a' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .tab-active { border-bottom: 2px solid #d946ef; color: #d946ef; font-weight: 600; }
    .dark .tab-active { border-bottom-color: #e879f9; color: #e879f9; }
    .streak-glow { text-shadow: 0 0 8px rgba(251, 191, 36, 0.5); }
    .icon-btn { transition: all 0.15s ease; }
    .icon-btn:hover { transform: scale(1.1); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1); }
    .dark .card-hover:hover { box-shadow: 0 8px 25px -5px rgba(0,0,0,0.4); }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    /* Checkbox */
    input[type="checkbox"] { accent-color: #d946ef; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-[#0d1117] min-h-screen text-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div id="app" class="max-w-5xl mx-auto px-4 py-6">
    <!-- Header -->
    <header class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/25">
          <i class="ri-footprint-line text-white text-lg"></i>
        </div>
        <h1 class="text-xl font-bold">Kawaii Tracker</h1>
      </div>
      <div class="flex items-center gap-3">
        <span id="clock" class="text-sm text-gray-400 dark:text-gray-500"></span>
        <button onclick="toggleDark()" class="icon-btn p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700">
          <i id="theme-icon" class="ri-moon-line text-lg"></i>
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="flex gap-1 border-b border-gray-200 dark:border-gray-800 mb-6 overflow-x-auto">
      <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition whitespace-nowrap" data-tab="dashboard">
        <i class="ri-dashboard-3-line"></i> Dashboard
      </button>
      <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition whitespace-nowrap" data-tab="events">
        <i class="ri-calendar-check-line"></i> Events
      </button>
      <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition whitespace-nowrap" data-tab="tags">
        <i class="ri-price-tag-3-line"></i> Tags
      </button>
      <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition whitespace-nowrap" data-tab="stats">
        <i class="ri-bar-chart-grouped-line"></i> Statistics
      </button>
    </nav>

    <!-- Content -->
    <main id="content"></main>
  </div>

  <script>
    const API = '';
    let currentTab = 'dashboard';

    // ==================== THEME ====================

    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') {
        document.documentElement.classList.remove('dark');
      }
      updateThemeIcon();
    }

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      if (document.documentElement.classList.contains('dark')) {
        icon.className = 'ri-moon-line text-lg';
      } else {
        icon.className = 'ri-sun-line text-lg';
      }
    }

    initTheme();

    // ==================== CLOCK ====================

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleString('zh-CN', {
        month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ==================== API ====================

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      return res.json();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const isActive = btn.dataset.tab === tab;
        btn.classList.toggle('tab-active', isActive);
        btn.classList.toggle('text-gray-500', !isActive);
        btn.classList.toggle('dark:text-gray-400', !isActive);
      });
      render();
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // ==================== DASHBOARD ====================

    async function renderDashboard() {
      const { data } = await api('/api/dashboard');
      if (!data) return '<p class="text-red-500"><i class="ri-error-warning-line"></i> Failed to load dashboard</p>';

      const dailyTags = data.filter(t => t.is_daily);
      const otherTags = data.filter(t => !t.is_daily);

      let html = '<div class="fade-in space-y-6">';

      // Today's overview
      html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 p-6">
        <h2 class="flex items-center gap-2 text-base font-semibold mb-5">
          <i class="ri-calendar-todo-line text-brand-500"></i> Today's Overview
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;

      for (const tag of dailyTags) {
        const done = tag.today_completed;
        const streak = tag.current_streak > 0;
        html += `
          <div class="card-hover relative rounded-xl p-5 border ${done ? 'border-emerald-200 dark:border-emerald-800/50 bg-emerald-50/50 dark:bg-emerald-950/20' : 'border-gray-200 dark:border-gray-700/50 bg-white dark:bg-[#1c2333]'}">
            ${done ? '<div class="absolute top-3 right-3"><i class="ri-checkbox-circle-fill text-emerald-500 text-xl"></i></div>' : '<div class="absolute top-3 right-3"><i class="ri-checkbox-blank-circle-line text-gray-300 dark:text-gray-600 text-xl"></i></div>'}
            <div class="flex items-center gap-2.5 mb-2">
              <div class="w-8 h-8 rounded-lg ${done ? 'bg-emerald-100 dark:bg-emerald-900/40' : 'bg-gray-100 dark:bg-gray-800'} flex items-center justify-center">
                <i class="ri-book-open-line ${done ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-400'}"></i>
              </div>
              <span class="font-semibold text-sm">${tag.tag}</span>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-3 pl-[42px]">${tag.description || ''}</p>
            <div class="flex items-center gap-4 pl-[42px]">
              ${streak ? `<span class="flex items-center gap-1 text-xs font-medium text-amber-500 streak-glow"><i class="ri-fire-fill"></i> ${tag.current_streak}d</span>` : ''}
              <span class="flex items-center gap-1 text-xs text-gray-400"><i class="ri-event-line"></i> ${tag.today_events}</span>
            </div>
          </div>`;
      }

      html += '</div></div>';

      // Non-daily tags
      if (otherTags.length > 0) {
        html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 p-6">
          <h2 class="flex items-center gap-2 text-base font-semibold mb-5">
            <i class="ri-price-tag-3-line text-brand-500"></i> Tags
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;

        for (const tag of otherTags) {
          html += `
            <div class="card-hover rounded-xl p-5 border border-gray-200 dark:border-gray-700/50 bg-white dark:bg-[#1c2333]">
              <div class="flex items-center gap-2.5 mb-2">
                <div class="w-8 h-8 rounded-lg bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center">
                  <i class="ri-hashtag text-brand-500"></i>
                </div>
                <span class="font-semibold text-sm">${tag.tag}</span>
              </div>
              <p class="text-xs text-gray-500 dark:text-gray-400 mb-3 pl-[42px]">${tag.description || ''}</p>
              <div class="flex items-center gap-1 text-xs text-gray-400 pl-[42px]">
                <i class="ri-bar-chart-line"></i> ${tag.total_days} days total
              </div>
            </div>`;
        }

        html += '</div></div>';
      }

      html += '</div>';
      return html;
    }

    // ==================== EVENTS ====================

    let eventFilter = { range: 'today' };

    async function renderEvents() {
      const params = new URLSearchParams();
      if (eventFilter.tag) params.set('tag', eventFilter.tag);
      if (eventFilter.range) params.set('range', eventFilter.range);

      const [eventsRes, tagsRes] = await Promise.all([
        api(`/api/events?${params}`),
        api('/api/tags'),
      ]);

      const events = eventsRes.data || [];
      const tags = tagsRes.data || [];

      let html = '<div class="fade-in space-y-4">';

      // Filters
      html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 p-4 flex flex-wrap gap-3 items-center">
        <i class="ri-filter-3-line text-gray-400"></i>
        <select id="event-range" class="text-sm border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-1.5 bg-white dark:bg-[#1c2333] dark:text-gray-200">
          <option value="today" ${eventFilter.range === 'today' ? 'selected' : ''}>Today</option>
          <option value="yesterday" ${eventFilter.range === 'yesterday' ? 'selected' : ''}>Yesterday</option>
          <option value="7d" ${eventFilter.range === '7d' ? 'selected' : ''}>Last 7 days</option>
          <option value="30d" ${eventFilter.range === '30d' ? 'selected' : ''}>Last 30 days</option>
          <option value="all" ${eventFilter.range === 'all' ? 'selected' : ''}>All</option>
        </select>
        <select id="event-tag" class="text-sm border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-1.5 bg-white dark:bg-[#1c2333] dark:text-gray-200">
          <option value="">All tags</option>
          ${tags.map(t => `<option value="${t.tag}" ${eventFilter.tag === t.tag ? 'selected' : ''}>${t.tag}</option>`).join('')}
        </select>
      </div>`;

      // Desktop table
      html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 overflow-hidden hidden md:block">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-[#0d1117] text-gray-500 dark:text-gray-400">
            <tr>
              <th class="text-left px-5 py-3 font-medium">Tag</th>
              <th class="text-left px-5 py-3 font-medium">Details</th>
              <th class="text-left px-5 py-3 font-medium">Mood</th>
              <th class="text-left px-5 py-3 font-medium">Status</th>
              <th class="text-left px-5 py-3 font-medium">Time</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;

      if (events.length === 0) {
        html += `<tr><td colspan="5" class="text-center py-12 text-gray-400">
          <i class="ri-inbox-line text-3xl mb-2 block"></i>
          <span class="text-sm">No events found</span>
        </td></tr>`;
      }

      for (const e of events) {
        const done = e.completed;
        const placeholder = e.daily_mark && !done;
        const statusIcon = done ? 'ri-checkbox-circle-fill text-emerald-500' :
                          placeholder ? 'ri-checkbox-blank-circle-line text-gray-300 dark:text-gray-600' :
                          'ri-edit-line text-blue-400';
        const time = new Date(e.created_at).toLocaleString('zh-CN');
        html += `
          <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-800/30 transition">
            <td class="px-5 py-3"><span class="inline-flex items-center gap-1 bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 px-2.5 py-0.5 rounded-full text-xs font-medium"><i class="ri-hashtag text-[10px]"></i> ${e.tag_name}</span></td>
            <td class="px-5 py-3 text-gray-600 dark:text-gray-300 max-w-xs truncate">${e.details || '<span class="text-gray-300 dark:text-gray-600">—</span>'}</td>
            <td class="px-5 py-3 text-lg">${e.mood || ''}</td>
            <td class="px-5 py-3"><i class="${statusIcon} text-lg"></i></td>
            <td class="px-5 py-3 text-gray-400 dark:text-gray-500 text-xs">${time}</td>
          </tr>`;
      }

      html += '</tbody></table></div>';

      // Mobile cards
      html += `<div class="md:hidden space-y-2">`;

      if (events.length === 0) {
        html += `<div class="text-center py-12 text-gray-400">
          <i class="ri-inbox-line text-3xl mb-2 block"></i>
          <span class="text-sm">No events found</span>
        </div>`;
      }

      for (const e of events) {
        const done = e.completed;
        const placeholder = e.daily_mark && !done;
        const statusIcon = done ? 'ri-checkbox-circle-fill text-emerald-500' :
                          placeholder ? 'ri-checkbox-blank-circle-line text-gray-300 dark:text-gray-600' :
                          'ri-edit-line text-blue-400';
        const time = new Date(e.created_at).toLocaleString('zh-CN');
        html += `
          <div class="bg-white dark:bg-[#161b22] rounded-xl border border-gray-100 dark:border-gray-800 p-4">
            <div class="flex items-center justify-between mb-2">
              <span class="inline-flex items-center gap-1 bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 px-2.5 py-0.5 rounded-full text-xs font-medium"><i class="ri-hashtag text-[10px]"></i> ${e.tag_name}</span>
              <i class="${statusIcon} text-lg"></i>
            </div>
            ${e.details ? `<p class="text-sm text-gray-700 dark:text-gray-300 mb-2">${e.details}</p>` : ''}
            <div class="flex items-center justify-between text-xs text-gray-400">
              <span>${e.mood || ''}</span>
              <span>${time}</span>
            </div>
          </div>`;
      }

      html += '</div></div>';

      setTimeout(() => {
        document.getElementById('event-range')?.addEventListener('change', e => {
          eventFilter.range = e.target.value;
          render();
        });
        document.getElementById('event-tag')?.addEventListener('change', e => {
          eventFilter.tag = e.target.value || undefined;
          render();
        });
      }, 0);

      return html;
    }



    // ==================== TAGS ====================

    async function renderTags() {
      const { data: tags } = await api('/api/tags');

      let html = '<div class="fade-in space-y-4">';

      // Add tag form
      html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 p-5">
        <h3 class="flex items-center gap-2 font-semibold mb-4">
          <i class="ri-add-circle-line text-brand-500"></i> Add Tag
        </h3>
        <div class="flex flex-wrap gap-3">
          <div class="relative flex-1 min-w-[140px]">
            <i class="ri-price-tag-3-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="new-tag-name" placeholder="tag name" class="w-full text-sm border border-gray-200 dark:border-gray-700 rounded-lg pl-9 pr-3 py-2 bg-white dark:bg-[#1c2333] dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-500/40">
          </div>
          <div class="relative flex-1 min-w-[200px]">
            <i class="ri-file-text-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="new-tag-desc" placeholder="description" class="w-full text-sm border border-gray-200 dark:border-gray-700 rounded-lg pl-9 pr-3 py-2 bg-white dark:bg-[#1c2333] dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-500/40">
          </div>
          <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer select-none">
            <input id="new-tag-daily" type="checkbox" class="rounded"> <i class="ri-repeat-line"></i> Daily
          </label>
          <button onclick="addTag()" class="flex items-center gap-1.5 bg-brand-500 text-white text-sm px-4 py-2 rounded-lg hover:bg-brand-600 transition shadow-sm shadow-brand-500/25">
            <i class="ri-add-line"></i> Add
          </button>
        </div>
      </div>`;

      // Desktop table
      html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 overflow-hidden hidden md:block">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-[#0d1117] text-gray-500 dark:text-gray-400">
            <tr>
              <th class="text-left px-5 py-3 font-medium">Name</th>
              <th class="text-left px-5 py-3 font-medium">Description</th>
              <th class="text-left px-5 py-3 font-medium">Daily</th>
              <th class="text-left px-5 py-3 font-medium">Created</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;

      for (const t of tags || []) {
        html += `
          <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-800/30 transition">
            <td class="px-5 py-3">
              <span class="inline-flex items-center gap-1.5 font-medium">
                <i class="ri-hashtag text-brand-400 text-xs"></i> ${t.tag}
              </span>
            </td>
            <td class="px-5 py-3 text-gray-600 dark:text-gray-400">${t.description || '—'}</td>
            <td class="px-5 py-3">${t.is_daily ? '<i class="ri-checkbox-circle-fill text-emerald-500"></i>' : '<i class="ri-close-circle-line text-gray-300 dark:text-gray-600"></i>'}</td>
            <td class="px-5 py-3 text-gray-400 dark:text-gray-500 text-xs">${new Date(t.created_at).toLocaleDateString('zh-CN')}</td>
          </tr>`;
      }

      html += '</tbody></table></div>';

      // Mobile cards
      html += `<div class="md:hidden space-y-2">`;
      for (const t of tags || []) {
        html += `
          <div class="bg-white dark:bg-[#161b22] rounded-xl border border-gray-100 dark:border-gray-800 p-4">
            <div class="flex items-center justify-between mb-1">
              <span class="inline-flex items-center gap-1.5 font-semibold text-sm">
                <i class="ri-hashtag text-brand-400 text-xs"></i> ${t.tag}
              </span>
              ${t.is_daily ? '<span class="text-xs bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 px-2 py-0.5 rounded-full">Daily</span>' : ''}
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">${t.description || '—'}</p>
            <span class="text-xs text-gray-400">${new Date(t.created_at).toLocaleDateString('zh-CN')}</span>
          </div>`;
      }
      html += '</div></div>';
      return html;
    }

    async function addTag() {
      const name = document.getElementById('new-tag-name').value.trim();
      const desc = document.getElementById('new-tag-desc').value.trim();
      const daily = document.getElementById('new-tag-daily').checked;
      if (!name) return alert('Tag name is required');

      await api('/api/tags', {
        method: 'POST',
        body: { tag: name, description: desc || undefined, is_daily: daily },
      });
      render();
    }



    // ==================== STATISTICS ====================

    async function renderStats() {
      const { data: stats } = await api('/api/statistics');

      let html = '<div class="fade-in">';
      html += `<div class="bg-white dark:bg-[#161b22] rounded-2xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-800 p-6">
        <h2 class="flex items-center gap-2 text-base font-semibold mb-5">
          <i class="ri-bar-chart-grouped-line text-brand-500"></i> Statistics
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;

      for (const s of stats || []) {
        html += `
          <div class="card-hover rounded-xl p-5 border border-gray-200 dark:border-gray-700/50 bg-white dark:bg-[#1c2333]">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-8 h-8 rounded-lg bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center">
                <i class="ri-hashtag text-brand-500"></i>
              </div>
              <span class="font-semibold text-sm">${s.tag}</span>
            </div>
            <div class="space-y-3">
              <div class="flex items-center justify-between">
                <span class="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400"><i class="ri-fire-fill text-orange-400"></i> Current Streak</span>
                <span class="font-bold text-amber-500 streak-glow text-sm">${s.current_streak}<span class="text-xs font-normal ml-0.5">days</span></span>
              </div>
              <div class="flex items-center justify-between">
                <span class="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400"><i class="ri-trophy-fill text-yellow-400"></i> Longest Streak</span>
                <span class="font-semibold text-sm">${s.longest_streak}<span class="text-xs font-normal ml-0.5 text-gray-400">days</span></span>
              </div>
              <div class="flex items-center justify-between">
                <span class="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400"><i class="ri-calendar-check-line text-blue-400"></i> Total Days</span>
                <span class="font-semibold text-sm">${s.total_checkin_days}<span class="text-xs font-normal ml-0.5 text-gray-400">days</span></span>
              </div>
              <div class="flex items-center justify-between">
                <span class="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400"><i class="ri-flag-line text-green-400"></i> First Check-in</span>
                <span class="text-xs text-gray-400">${s.first_checkin_at ? new Date(s.first_checkin_at).toLocaleDateString('zh-CN') : '—'}</span>
              </div>
            </div>
          </div>`;
      }

      html += '</div></div></div>';
      return html;
    }

    // ==================== RENDER ====================

    async function render() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="flex items-center justify-center py-16 text-gray-400"><i class="ri-loader-4-line text-2xl animate-spin"></i></div>';
      switch (currentTab) {
        case 'dashboard': content.innerHTML = await renderDashboard(); break;
        case 'events': content.innerHTML = await renderEvents(); break;
        case 'tags': content.innerHTML = await renderTags(); break;
        case 'stats': content.innerHTML = await renderStats(); break;
      }
    }

    // Init
    switchTab('dashboard');
  </script>
</body>
</html>
