<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawaii Tracker — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#0d1117] min-h-screen flex items-center justify-center text-gray-100">
  <div class="fade-in w-full max-w-sm px-6">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-500/25">
        <i class="ri-footprint-line text-white text-3xl"></i>
      </div>
      <h1 class="text-xl font-bold">Kawaii Tracker</h1>
      <p class="text-sm text-gray-500 mt-1">Enter your token to continue</p>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="relative mb-4">
        <i class="ri-key-2-line absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
        <input
          id="token-input"
          type="password"
          placeholder="Access token"
          autocomplete="off"
          class="w-full bg-[#161b22] border border-gray-700 rounded-xl pl-11 pr-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500/50 transition"
        >
        <button type="button" onclick="toggleVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition">
          <i id="eye-icon" class="ri-eye-off-line"></i>
        </button>
      </div>

      <div id="error-msg" class="hidden text-red-400 text-xs mb-3 flex items-center gap-1.5">
        <i class="ri-error-warning-line"></i>
        <span>Invalid token</span>
      </div>

      <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white text-sm font-semibold py-3 rounded-xl hover:opacity-90 transition shadow-lg shadow-purple-500/20 flex items-center justify-center gap-2">
        <i class="ri-login-box-line"></i> Unlock
      </button>
    </form>

    <p class="text-center text-xs text-gray-600 mt-6">Kawaii Tracker v1.0</p>
  </div>

  <script>
    // Redirect if already authenticated
    if (document.cookie.includes('kt_session')) {
      window.location.href = '/';
    }

    function toggleVisibility() {
      const input = document.getElementById('token-input');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ri-eye-line';
      } else {
        input.type = 'password';
        icon.className = 'ri-eye-off-line';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const input = document.getElementById('token-input');
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      const token = input.value.trim();

      if (!token) {
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="ri-loader-4-line animate-spin"></i> Verifying...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });

        const data = await res.json();

        if (data.ok) {
          window.location.href = '/';
        } else {
          err.classList.remove('hidden');
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 400);
          input.select();
        }
      } catch {
        err.classList.remove('hidden');
        err.querySelector('span').textContent = 'Network error';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-login-box-line"></i> Unlock';
      }
    }
  </script>
</body>
</html>
